<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokeridos 🃏</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }
    #app {
      width: 100%; max-width: 480px;
      height: 92vh; max-height: 720px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #header {
      padding: 14px 18px;
      border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; gap: 10px;
    }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: #1a56db;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    #header h1 { font-size: 15px; font-weight: 600; color: #111; }
    #header p  { font-size: 12px; color: #888; margin-top: 1px; }
    #messages {
      flex: 1; overflow-y: auto;
      padding: 16px 14px;
      display: flex; flex-direction: column; gap: 10px;
      background: #f8f9fb;
    }
    .msg { display: flex; flex-direction: column; max-width: 82%; gap: 2px; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }
    .bubble {
      padding: 9px 13px; border-radius: 16px;
      font-size: 14px; line-height: 1.55; word-break: break-word;
    }
    .msg.user .bubble { background: #1a56db; color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot  .bubble { background: #fff; color: #111; border-bottom-left-radius: 4px; border: 1px solid #e8e8e8; }
    .sugs {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 8px 14px 4px; background: #f8f9fb;
    }
    .sug {
      font-size: 12px; padding: 5px 10px; border-radius: 12px;
      border: 1px solid #dde; background: #fff; color: #444;
      cursor: pointer; transition: all 0.15s;
    }
    .sug:hover { background: #f0f4ff; border-color: #1a56db; color: #1a56db; }
    #input-area {
      padding: 10px 12px; border-top: 1px solid #f0f0f0;
      display: flex; gap: 8px; align-items: flex-end; background: #fff;
    }
    #prompt {
      flex: 1; border: 1px solid #dde; border-radius: 20px;
      padding: 9px 14px; font-size: 14px; font-family: inherit;
      color: #111; background: #f8f9fb; outline: none;
      resize: none; min-height: 40px; max-height: 100px; line-height: 1.4;
    }
    #prompt:focus { border-color: #1a56db; background: #fff; }
    #send {
      width: 38px; height: 38px; border-radius: 50%;
      background: #1a56db; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #send:hover { background: #1345b5; }
    #send svg { width: 16px; height: 16px; fill: white; }
    .thinking { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: bounce 1s infinite; }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }
    @media (max-width: 500px) {
      body { padding: 0; align-items: flex-end; }
      #app { height: 100vh; max-height: 100vh; border-radius: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="avatar">🃏</div>
    <div>
      <h1>Pokeridos</h1>
      <p>Torneo · Chat · Fixture</p>
    </div>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="bubble">¡Bienvenido! Soy el asistente de Pokeridos. Tengo acceso al historial del torneo 2016–2026, el chat del grupo y el fixture. ¿Qué querés saber?</div>
    </div>
  </div>

  <div class="sugs" id="sugs">
    <button class="sug">¿Quién lidera el torneo 2026?</button>
    <button class="sug">Próximo anfitrión</button>
    <button class="sug">Resultados última fecha</button>
    <button class="sug">Fixture completo 2026</button>
    <button class="sug">¿Quién ganó más torneos?</button>
  </div>

  <div id="input-area">
    <textarea id="prompt" placeholder="Preguntá sobre el torneo, el fixture…" rows="1"></textarea>
    <button id="send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const msgs   = document.getElementById('messages');
  const input  = document.getElementById('prompt');
  const sugsEl = document.getElementById('sugs');
  const history = [];

  document.querySelectorAll('.sug').forEach(b => b.addEventListener('click', () => send(b.textContent)));
  document.getElementById('send').addEventListener('click', trigger);
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); trigger(); } });
  input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 100) + 'px'; });

  function trigger() {
    const t = input.value.trim();
    if (!t) return;
    input.value = ''; input.style.height = 'auto';
    send(t);
  }

  function addMsg(role, html) {
    const d = document.createElement('div'); d.className = 'msg ' + role;
    const b = document.createElement('div'); b.className = 'bubble'; b.innerHTML = html;
    d.appendChild(b); msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
  }

  function showThinking() {
    const d = document.createElement('div'); d.className = 'msg bot'; d.id = 'thinking';
    const b = document.createElement('div'); b.className = 'bubble thinking';
    b.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    d.appendChild(b); msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
  }

  async function send(text) {
    addMsg('user', text);
    sugsEl.style.display = 'none';
    showThinking();
    history.push({ role: 'user', content: text });
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      document.getElementById('thinking')?.remove();
      const reply = data.content?.find(b => b.type === 'text')?.text || 'Sin respuesta.';
      history.push({ role: 'assistant', content: reply });
      addMsg('bot', reply.replace(/\n/g, '<br>'));
    } catch (e) {
      document.getElementById('thinking')?.remove();
      addMsg('bot', 'Error: ' + e.message);
    }
  }
</script>
</body>
</html>
